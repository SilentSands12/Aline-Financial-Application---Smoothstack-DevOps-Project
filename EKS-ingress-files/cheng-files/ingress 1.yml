# Ingress configuration for landing portal
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aline-landing-portal-rules # Unique name for this Ingress resource
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing # ALB will be accessible from the internet
    alb.ingress.kubernetes.io/target-type: ip # Targets are IP addresses
    alb.ingress.kubernetes.io/group.name: aline-financial # Group name for ALB rules
    alb.ingress.kubernetes.io/group.order: '10' # Rule priority within the group
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 3001}]' # ALB listens on port 3001 for HTTP traffic
spec:
  ingressClassName: alb # Specifies that this Ingress uses the ALB controller
  rules:
      - http:
          paths:
          - path: /
            pathType: Prefix # Matches all paths starting with '/'
            backend:
              service:
                name: landing-portal-service # Service to route traffic to
                port:
                  number: 3001 # Port of the service

