apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-microservice
  template:
    metadata:
      labels:
        app: user-microservice
    spec:
      containers:
      - name: user-microservice
        image: user-microservice:BuildJarFile
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          value: mysql-service  # Service name of the MySQL database
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_PASSWORD
        ports:
        - containerPort: 8070

---
apiVersion: v1
kind: Service
metadata:
  name: user-microservice-service
spec:
  type: LoadBalancer
  selector:
    app: user-microservice   # Match the labels used by your user microservice deployment
  ports:
    - protocol: TCP
      port: 8070   # Port used by user microservice
      targetPort: 8070   # Port on the user microservice pod to forward traffic to