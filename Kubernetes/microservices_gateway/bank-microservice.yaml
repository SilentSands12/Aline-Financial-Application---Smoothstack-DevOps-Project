apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-microservice-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-microservice
  template:
    metadata:
      labels:
        app: bank-microservice
    spec:
      containers:
      - name: bank-microservice-container
        image: bank-microservice:BuildJarFile
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          value: mysql-service  # Service name of the MySQL database
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_PASSWORD
        ports:
        - containerPort: 8083

---
apiVersion: v1
kind: Service
metadata:
  name: bank-microservice-service
spec:
  type: LoadBalancer
  selector:
    app: bank-microservice   # Match the labels used by your bank microservice deployment
  ports:
    - protocol: TCP
      port: 8083   # Port used by bank microservice
      targetPort: 8083   # Port on the bank microservice pod to forward traffic to