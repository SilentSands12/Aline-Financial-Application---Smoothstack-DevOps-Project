apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-microservice-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-microservice
  template:
    metadata:
      labels:
        app: account-microservice
    spec:
      containers:
      - name: account-microservice-container
        image: account-microservice:BuildJarFile
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          value: mysql-service  # Service name of the MySQL database
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_PASSWORD
        ports:
        - containerPort: 8072

---
apiVersion: v1
kind: Service
metadata:
  name: account-microservice-service
spec:
  type: LoadBalancer
  selector:
    app: account-microservice   # Match the labels used by your account microservice deployment
  ports:
    - protocol: TCP
      port: 8072   # Port used by account microservice
      targetPort: 8072   # Port on the account microservice pod to forward traffic to