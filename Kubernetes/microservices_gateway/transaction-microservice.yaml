apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-microservice-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-microservice
  template:
    metadata:
      labels:
        app: transaction-microservice
    spec:
      containers:
      - name: transaction-microservice-container
        image: transaction-microservice:BuildJarFile
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          value: mysql-service  # Service name of the MySQL database
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_PASSWORD
        ports:
        - containerPort: 8073

---
apiVersion: v1
kind: Service
metadata:
  name: transaction-microservice-service
spec:
  type: LoadBalancer
  selector:
    app: transaction-microservice   # Match the labels used by your transaction microservice deployment
  ports:
    - protocol: TCP
      port: 8073   # Port used by transaction microservice
      targetPort: 8073   # Port on the transaction microservice pod to forward traffic to