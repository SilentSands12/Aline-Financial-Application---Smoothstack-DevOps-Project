apiVersion: apps/v1
kind: Deployment
metadata:
  name: member-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: member-dashboard
  template:
    metadata:
      labels:
        app: member-dashboard
    spec:
      nodeSelector:
        member-dashboard: NodeGroup
      containers:
      - name: member-dashboard
        image: 767397723308.dkr.ecr.us-east-1.amazonaws.com/aline_financial_repo:member-dashboard-fafo
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3007

---
apiVersion: v1
kind: Service
metadata:
  name: member-dashboard-service
spec:
  type: LoadBalancer
  selector:
    app: member-dashboard  # Match the labels used by your user microservice deployment
  ports:
    - protocol: TCP
      port: 3007   # Port used by user microservice
      targetPort: 80  # Port on the user microservice pod to forward traffic to