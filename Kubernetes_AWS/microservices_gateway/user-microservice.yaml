apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-microservice
  template:
    metadata:
      labels:
        app: user-microservice
        target: microservice
    spec:
      nodeSelector:
        user-microservice: NodeGroup
      containers:
      - name: user-microservice
        image: 767397723308.dkr.ecr.us-east-1.amazonaws.com/aline_financial_repo:user-microservice-fafo
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DB_HOST
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_PASSWORD
        - name: APP_PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: APP_PORT_USER
        envFrom:
        - configMapRef:
            name: backend-config
        ports:
        - containerPort: 8070

---
apiVersion: v1
kind: Service
metadata:
  name: user-microservice-service
spec:
  type: ClusterIP
  selector:
    app: user-microservice   # Match the labels used by your user microservice deployment
  ports:
  - protocol: TCP
    port: 8070   # Port used by user microservice
    targetPort: 8070   # Port on the user microservice pod to forward traffic to
