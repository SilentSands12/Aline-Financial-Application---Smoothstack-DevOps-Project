# Service for the gateway. Will have to do a loadbalancer for requests
apiVersion: v1
kind: Service
metadata:
  name: aline-gateway-service
spec:
  type: LoadBalancer
  selector:
    app: aline-gateway  # Match the labels used by your aline-gateway deployment
  ports:
    - protocol: TCP
      port: 8080   # Port used by aline-gateway
      targetPort: 8080   # Port on the aline-gateway pod to forward traffic to