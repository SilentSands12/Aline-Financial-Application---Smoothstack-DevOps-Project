apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-microservice
  template:
    metadata:
      labels:
        app: account-microservice
        target: microservice
    spec:
      nodeSelector:
        account-microservice: NodeGroup
      containers:
      - name: account-microservice-container
        image: 767397723308.dkr.ecr.us-east-1.amazonaws.com/aline_financial_repo:account-microservice-fafo
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          valueFrom:
            configMapRef:
              name: backend-config
              KEY: DB_HOST
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_PASSWORD
        envFrom:
          - configMapRef:
              name: backend-config
        - name: APP_HOST
          valueFrom:
            configMapRef:
              name: backend-config
              key: APP_HOST_ACCOUNT
        ports:
        - containerPort: 8072

---
apiVersion: v1
kind: Service
metadata:
  name: account-microservice-service
spec:
  type: ClusterIP
  selector:
    app: account-microservice   # Match the labels used by your account microservice deployment
  ports:
    - protocol: TCP
      port: 8072   # Port used by account microservice
      targetPort: 8072   # Port on the account microservice pod to forward traffic to