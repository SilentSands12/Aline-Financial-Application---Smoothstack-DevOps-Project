apiVersion: apps/v1
kind: Deployment
metadata:
  name: underwriter-microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: underwriter-microservice
  template:
    metadata:
      labels:
        app: underwriter-microservice
        target: microservice
    spec:
      nodeSelector:
        underwriter-microservice: NodeGroup
      containers:
      - name: underwriter-microservice-container
        image: 767397723308.dkr.ecr.us-east-1.amazonaws.com/aline_financial_repo:underwriter-microservice-fafo
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          valueFrom:
            configMapRef:
              name: backend-config
              KEY: DB_HOST
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_PASSWORD
        envFrom:
          - configMapRef:
              name: backend-config
        - name: APP_HOST
          valueFrom:
            configMapRef:
              name: backend-config
              key: APP_HOST_UNDERWRITER
        ports:
        - containerPort: 8071

---
apiVersion: v1
kind: Service
metadata:
  name: underwriter-microservice-service
spec:
  type: ClusterIP
  selector:
    app: underwriter-microservice   # Match the labels used by your underwriter microservice deployment
  ports:
    - protocol: TCP
      port: 8071   # Port used by underwriter microservice
      targetPort: 8071   # Port on the underwriter microservice pod to forward traffic to