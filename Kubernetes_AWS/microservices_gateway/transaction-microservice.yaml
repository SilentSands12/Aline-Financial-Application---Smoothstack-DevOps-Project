apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-microservice
  template:
    metadata:
      labels:
        app: transaction-microservice
        target: microservice
    spec:
      nodeSelector:
        transaction-microservice: NodeGroup
      containers:
      - name: transaction-microservice-container
        image: 767397723308.dkr.ecr.us-east-1.amazonaws.com/aline_financial_repo:transaction-microservice-fafo
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          valueFrom:
            configMapRef:
              name: backend-config
              KEY: DB_HOST
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: MYSQL_PASSWORD
        envFrom:
          - configMapRef:
              name: backend-config
        - name: APP_HOST
          valueFrom:
            configMapRef:
              name: backend-config
              key: APP_HOST_TRANSACTION
        ports:
        - containerPort: 8073

---
apiVersion: v1
kind: Service
metadata:
  name: transaction-microservice-service
spec:
  type: ClusterIP
  selector:
    app: transaction-microservice   # Match the labels used by your transaction microservice deployment
  ports:
    - protocol: TCP
      port: 8073   # Port used by transaction microservice
      targetPort: 8073   # Port on the transaction microservice pod to forward traffic to