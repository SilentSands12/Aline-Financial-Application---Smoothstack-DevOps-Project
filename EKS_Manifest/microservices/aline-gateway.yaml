# Define the API version for the Deployment resource
apiVersion: apps/v1
# Specify the kind of Kubernetes resource, which is a Deployment in this case
kind: Deployment
# Metadata section for the Deployment
metadata:
  # The name of the Deployment
  name: aline-gateway
# Specification of the Deployment
spec:
  # Number of pod replicas to run
  replicas: 1
  # Define the selector to match pods with specified labels
  selector:
    matchLabels:
      app: aline-gateway
  # Template for the pod specification
  template:
    metadata:
      labels:
        # Label for identifying the pods
        app: aline-gateway
    spec:
      # Define the container(s) for the pod
      containers:
      - name: aline-gateway-container
        # Docker image for the container
        image: 767397723308.dkr.ecr.us-east-1.amazonaws.com/aline_financial_repo:aline-gateway-jenkins-latest
        # Policy to always pull the image
        imagePullPolicy: Always
        # Define the ports exposed by the container
        ports:
          - containerPort: 8080  # Expose port 8080 on the container
        # Environment variables for the container
        env:
          - name: APP_SERVICE_HOST
            # Directly set the value of the environment variable
            value: http://app-service-host-aws.default.svc.cluster.local
        envFrom:
          - configMapRef:
              # Load all key-value pairs from the specified ConfigMap
              name: backend-config

